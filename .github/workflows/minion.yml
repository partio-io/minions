name: Run Minion

on:
  workflow_dispatch:
    inputs:
      task_file:
        description: "Task YAML file path (e.g., tasks/detect-external-hooks.yaml) or 'tasks/' for all"
        required: true
        type: string
      parallel:
        description: "Max parallel minions"
        required: false
        default: "2"
        type: string
      dry_run:
        description: "Dry run (prompt generation only)"
        required: false
        default: false
        type: boolean

  # Auto-trigger on issues labeled 'minion-ready'
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  run-minion:
    # Skip issue trigger unless the label is 'minion-ready'
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'minion-ready')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Checkout all repos side-by-side
      - name: Checkout minions
        uses: actions/checkout@v4
        with:
          repository: partio-io/minions
          path: minions

      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          repository: partio-io/cli
          path: cli
          token: ${{ secrets.PARTIO_PAT }}

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          repository: partio-io/app
          path: app
          token: ${{ secrets.PARTIO_PAT }}

      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          repository: partio-io/docs
          path: docs
          token: ${{ secrets.PARTIO_PAT }}

      - name: Checkout site
        uses: actions/checkout@v4
        with:
          repository: partio-io/site
          path: site
          token: ${{ secrets.PARTIO_PAT }}

      - name: Checkout extension
        uses: actions/checkout@v4
        with:
          repository: partio-io/extension
          path: extension
          token: ${{ secrets.PARTIO_PAT }}

      # Install toolchains
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build minions
        run: cd minions && make build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # Determine task file (workflow_dispatch vs issue trigger)
      - name: Determine task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task_file=${{ inputs.task_file }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
            echo "parallel=${{ inputs.parallel }}" >> "$GITHUB_OUTPUT"
          else
            # Issue trigger: generate task from issue
            ISSUE_NUM="${{ github.event.issue.number }}"
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json body -q '.body')

            # Create task file from issue
            TASK_ID=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | head -c 60)
            TASK_FILE="minions/tasks/${TASK_ID}.yaml"

            cat > "$TASK_FILE" <<YAML
          id: ${TASK_ID}
          title: "${ISSUE_TITLE}"
          source: "${{ github.repository }}#${ISSUE_NUM}"
          source_type: issue
          description: |
          $(echo "$ISSUE_BODY" | sed 's/^/  /')
          target_repos:
            - cli
          acceptance_criteria:
            - "All repo checks pass"
          pr_labels:
            - "minion"
          YAML

            echo "task_file=${TASK_FILE}" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "parallel=1" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.PARTIO_PAT }}

      # Run the minion
      - name: Execute minion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PARTIO_PAT }}
          WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          cd minions
          ARGS="run ${{ steps.task.outputs.task_file }}"
          if [ "${{ steps.task.outputs.dry_run }}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          ARGS="${ARGS} --parallel ${{ steps.task.outputs.parallel }}"
          ./minions $ARGS
