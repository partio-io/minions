name: Documentation Minion

on:
  workflow_dispatch:
    inputs:
      pr_ref:
        description: "PR reference (e.g., partio-io/cli#42)"
        required: true
        type: string
      dry_run:
        description: "Dry run (prompt generation only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout minions
        uses: actions/checkout@v4
        with:
          path: minions

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout project repos
        env:
          GH_TOKEN: ${{ secrets.PARTIO_PAT }}
        run: |
          for ENTRY in $(yq -r '.repos[] | .full_name + ":" + .name' minions/.minions/project.yaml); do
            FULL="${ENTRY%%:*}"
            SHORT="${ENTRY##*:}"
            gh repo clone "$FULL" "$SHORT" -- --depth=1
          done

      - name: Configure git auth
        env:
          GH_TOKEN: ${{ secrets.PARTIO_PAT }}
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build minions
        run: cd minions && make build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run doc minion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PARTIO_PAT }}
          WORKSPACE_ROOT: ${{ github.workspace }}
        run: |
          cd minions
          ARGS="doc --pr ${{ inputs.pr_ref }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="${ARGS} --dry-run"
          fi
          ./minions $ARGS
