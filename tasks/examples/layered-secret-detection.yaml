id: layered-secret-detection
title: "Warn when session data may contain secrets"
source: "entireio/cli#280 (changelog 0.3.5)"
source_type: changelog
description: |
  Add a lightweight secret detection check before storing session data in
  checkpoints. When the captured session JSONL contains patterns that look
  like secrets (API keys, tokens, passwords), warn the user and optionally
  skip storing that session's content.

  Detection should be pattern-based (not ML), checking for:
  - API key patterns: `sk-`, `ghp_`, `gho_`, `AKIA`, `xoxb-`, `xoxp-`
  - Generic patterns: lines containing "password", "secret", "token" followed
    by assignment operators and values that look like credentials
  - Base64-encoded strings longer than 40 characters in suspicious contexts

  This should be a pre-storage check in the checkpoint creation flow:
  1. After parsing the session JSONL, scan the content
  2. If potential secrets are found, log a warning with the patterns matched
  3. If `PARTIO_SKIP_SECRET_SESSIONS=1`, skip storing the session content
     (still create the checkpoint with attribution data, just omit the raw session)

  The check should be fast (regex-based) and have minimal false positives.
  Err on the side of not warning rather than over-warning.
target_repos:
  - cli
  - docs
context_hints:
  - "cli/internal/checkpoint/"
  - "cli/internal/agent/claude/parse_jsonl.go"
  - "docs/cli/configuration.mdx"
acceptance_criteria:
  - "Session content is scanned for secret patterns before checkpoint storage"
  - "Warning logged when potential secrets detected"
  - "PARTIO_SKIP_SECRET_SESSIONS=1 skips session content storage"
  - "Checkpoint attribution data is still stored even when session content is skipped"
  - "make test passes in cli/"
  - "make lint passes in cli/"
  - "docs/cli/configuration.mdx documents the new env var"
pr_labels:
  - "minion"
  - "feature"
  - "security"
